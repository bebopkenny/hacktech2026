version: "3.9"

services:
  coordination:
    build:
      context: ./coordination-service
      dockerfile: deploy/Dockerfile
    ports:
      - "8000:8000"
    environment:
      AI_LAYER_URL: http://ai-layer:8001
      PORT: 8000
    depends_on:
      - ai-layer
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; urllib.request.urlopen('http://localhost:8000/health', timeout=3); sys.exit(0)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  ai-layer:
    build:
      context: ./ai-layer
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    env_file:
      - .env
    environment:
      PORT: 8001
      K2_BASE_URL: https://api.k2think.ai/v1
      K2_MODEL: MBZUAI-IFM/K2-Think-v2
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; urllib.request.urlopen('http://localhost:8001/health', timeout=3); sys.exit(0)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
