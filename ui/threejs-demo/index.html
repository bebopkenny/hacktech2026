<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>RevitSync Live Demo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #111318; overflow: hidden; font-family: 'Segoe UI', monospace; }

    #overlay {
      position: fixed; top: 16px; right: 16px; width: 340px;
      z-index: 10; display: flex; flex-direction: column; gap: 8px;
      max-height: calc(100vh - 32px); overflow-y: auto;
    }

    .conflict-card {
      background: rgba(255, 68, 68, 0.12);
      border: 1px solid rgba(255, 68, 68, 0.5);
      border-left: 3px solid #ff4444;
      border-radius: 6px;
      padding: 10px 14px;
      color: #f5c6c6;
      font-size: 13px;
      line-height: 1.5;
      animation: slidein 0.25s ease;
    }
    .conflict-card.warning {
      background: rgba(255, 180, 0, 0.1);
      border-color: rgba(255, 180, 0, 0.5);
      border-left-color: #ffb400;
      color: #f5e6c6;
    }
    .conflict-card .label {
      font-size: 10px; font-weight: 700; letter-spacing: 0.08em;
      text-transform: uppercase; opacity: 0.7; margin-bottom: 4px;
    }
    .conflict-card .suggestion {
      color: #a8f0c6; margin-top: 6px; font-size: 12px;
    }
    .conflict-card .elements {
      font-size: 10px; opacity: 0.5; margin-top: 4px;
    }
    @keyframes slidein {
      from { opacity: 0; transform: translateX(12px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    #hud {
      position: fixed; top: 16px; left: 16px;
      color: #e0e0e0; font-size: 13px; z-index: 10;
    }
    #hud .title { font-size: 18px; font-weight: 700; color: #fff; margin-bottom: 4px; }
    #hud .subtitle { opacity: 0.5; font-size: 11px; }

    #status {
      position: fixed; bottom: 14px; left: 16px;
      font-size: 11px; color: #888; z-index: 10;
      display: flex; align-items: center; gap: 6px;
    }
    #status::before {
      content: ''; display: inline-block;
      width: 7px; height: 7px; border-radius: 50%;
      background: currentColor;
    }

    #conflict-count {
      position: fixed; bottom: 14px; right: 16px;
      font-size: 11px; color: #888; z-index: 10;
    }
  </style>
</head>
<body>
  <div id="hud">
    <div class="title">RevitSync</div>
    <div class="subtitle">Real-time BIM collaboration</div>
  </div>

  <div id="overlay"></div>

  <div id="status">Connecting…</div>
  <div id="conflict-count">0 conflicts</div>

  <script type="module">
    import { initScene }  from './renderer.js';
    import { connect }    from './ws_client.js';

    initScene();

    let total = 0;
    const countEl = document.getElementById('conflict-count');

    connect((conflict) => {
      total++;
      countEl.textContent = `${total} conflict${total === 1 ? '' : 's'}`;

      const overlay = document.getElementById('overlay');
      const card = document.createElement('div');
      card.className = `conflict-card ${conflict.severity === 'warning' ? 'warning' : ''}`;
      card.innerHTML = `
        <div class="label">${conflict.severity === 'warning' ? '⚠ Warning' : '✖ Error'}</div>
        ${conflict.plain_english}
        <div class="suggestion">💡 ${conflict.suggestion}</div>
        <div class="elements">Elements: ${conflict.elements?.join(', ')}</div>
      `;
      overlay.prepend(card);
      setTimeout(() => card.remove(), 15000);
    });
  </script>
</body>
</html>
